<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cognetivy Embed - Runs View</title>
  <script src="https://cdn.jsdelivr.net/npm/iframe-resizer@4.3.2/js/iframeResizer.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #FAFAFA;
      padding: 16px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #0D0D0D;
    }
    .embed-container {
      background: white;
      border: 1px solid #D9D9D9;
      border-radius: 8px;
      overflow: hidden;
    }
    iframe {
      width: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Workflow Runs</h1>
    <div class="embed-container">
      <!-- Replace PROJECT_ID and COGNETIVY_HOST with actual values -->
      <iframe
        id="cognetivy-runs"
        src="http://localhost:3744/embed/runs?projectId=PLANE_PROJECT_ID"
        width="100%"
        height="600"
        frameborder="0"
        style="border: none;"
      ></iframe>
    </div>
  </div>

  <script>
    // Initialize iframe-resizer for automatic height
    iframeResize({ log: false }, '#cognetivy-runs');
  </script>
</body>
</html>
